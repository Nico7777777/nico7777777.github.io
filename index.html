<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick's Page</title>

  <!--- favicon --->
  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">

  <!--- custom css link --->
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/responsiveness.css">
  <link rel="stylesheet" href="./assets/css/carousel.css">

  <!--- google font link --->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!--
    - #MAIN
  -->

  <main>

    <!--- #SIDEBAR --->

    <div id="sidebar-container"></div>

    <!--- #main-content --->
    <div class="main-content">
      <!--- #NAVBAR --->
      <div id="navbar-container"></div>

      <!--- #ABOUT --->
      <div id="about-container"></div>

      <!--- #RESUME --->
      <div id="resume-container"></div>

      <!--- #PORTFOLIO --->
      <div id="portfolio-container"></div>

      <!--- #BLOG --->
      <div id="blog-container"></div>

      <div id="more_me-container"></div>
    </div>

  </main>






  <!--
    - custom js link
  -->
  
  <!-- Dynamic Component Loader -->
  <script>
    async function loadComponents() {
      const components = [
        { id: 'sidebar-container', url: './components/sidebar.html' },
        { id: 'navbar-container', url: './components/navbar.html' },
        { id: 'about-container', url: './components/about.html' },
        { id: 'resume-container', url: './components/resume.html' },
        { id: 'portfolio-container', url: './components/portfolio.html' },
        { id: 'blog-container', url: './components/blog.html' },
        { id: 'more_me-container', url: './components/more_me.html' }
      ];

      for (const comp of components) {
        try {
          const response = await fetch(comp.url);
          if (response.ok) {
            const html = await response.text();
            const container = document.getElementById(comp.id);
            if (container) {
                container.outerHTML = html;
            }
          }
        } catch (e) {
          console.error('Error loading ' + comp.url, e);
        }
      }

      // Initialize the main script after DOM elements are added
      const script = document.createElement('script');
      script.src = "./assets/js/script.js";
      document.body.appendChild(script);
    }
    loadComponents();
  </script>


  <!--
    - ionicon link
  -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
